<section>
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a routerLink="/products">Products</a></li>
      <li class="breadcrumb-item active" aria-current="page">Add Product</li>
    </ol>
  </nav>

  <div class="page-card">
    <div class="page-card-header">
      <h2 class="page-title">Add Product</h2>
      <p class="page-subtitle">Create a new product for demo data and automated testing exercises.</p>
    </div>

    <div class="page-card-body">
      <div class="form-callout">
        <h3 class="form-callout-title">Build clean test-friendly data</h3>
        <p class="form-callout-copy">
          Add realistic product information with clear validation so each workflow stays easy to
          automate and demonstrate.
        </p>
      </div>

      <app-product-form
        mode="add"
        [submitting]="isSubmitting"
        (cancel)="onCancel()"
        (formSubmit)="onSubmit($event)">
      </app-product-form>
    </div>
  </div>
</section>
